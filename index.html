<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Berhitung Cepat</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #333;
            padding: 20px;
        }

        .game-container {
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h1 {
            color: #4a5568;
            margin-bottom: 20px;
            font-size: 24px;
        }

        .stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-weight: bold;
            font-size: 18px;
        }

        #score { color: #38a169; }
        #timer { color: #e53e3e; }

        .question {
            font-size: 42px;
            font-weight: bold;
            margin: 20px 0;
            color: #2d3748;
            letter-spacing: 2px;
        }

        input[type="number"] {
            width: 100%;
            padding: 15px;
            font-size: 24px;
            text-align: center;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            margin-bottom: 20px;
            outline: none;
            -moz-appearance: textfield;
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        input[type="number"]:focus {
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            font-size: 18px;
            font-weight: bold;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background-color: #5a67d8;
        }

        .hidden {
            display: none;
        }

        #result-screen h2 {
            font-size: 28px;
            color: #2d3748;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <div class="game-container">
        <div id="start-screen">
            <h1>Game Berhitung Cepat</h1>
            <p style="margin-bottom: 20px; color: #718096;">Jawab pertanyaan sebanyak-banyaknya dalam 30 detik!</p>
            <button onclick="startGame()">Mulai Game</button>
        </div>

        <div id="game-screen" class="hidden">
            <div class="stats">
                <div>Skor: <span id="score">0</span></div>
                <div>Waktu: <span id="timer">30</span>s</div>
            </div>
            <div class="question" id="question">0 + 0</div>
            <input type="number" id="answer" pattern="[0-9]*" inputmode="numeric" placeholder="Jawabanmu..." autofocus>
            <button onclick="checkAnswer()">Kirim</button>
        </div>

        <div id="result-screen" class="hidden">
            <h2>Game Selesai!</h2>
            <p style="font-size: 20px; margin-bottom: 20px;">Skor Akhir Kamu: <strong id="final-score">0</strong></p>
            <button onclick="resetGame()">Main Lagi</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 30;
        let timerInterval;
        let correctAnswer;

        const startScreen = document.getElementById('start-screen');
        const gameScreen = document.getElementById('game-screen');
        const resultScreen = document.getElementById('result-screen');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const questionDisplay = document.getElementById('question');
        const answerInput = document.getElementById('answer');
        const finalScoreDisplay = document.getElementById('final-score');

        // Deteksi tombol Enter di keyboard/HP
        answerInput.addEventListener('keyup', function(event) {
            if (event.key === 'Enter') {
                checkAnswer();
            }
        });

        function startGame() {
            score = 0;
            timeLeft = 30;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            
            startScreen.classList.add('hidden');
            resultScreen.classList.add('hidden');
            gameScreen.classList.remove('hidden');
            
            generateQuestion();
            answerInput.focus();

            timerInterval = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;

                if (timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        function generateQuestion() {
            // Angka acak antara 1 sampai 15
            const num1 = Math.floor(Math.random() * 15) + 1;
            const num2 = Math.floor(Math.random() * 15) + 1;
            
            // Pilih acak antara tambah (+) atau kurang (-)
            const operation = Math.random() > 0.5 ? '+' : '-';
            
            if (operation === '+') {
                correctAnswer = num1 + num2;
                questionDisplay.textContent = `${num1} + ${num2}`;
            } else {
                // Memastikan hasil pengurangan tidak minus agar lebih seru
                const max = Math.max(num1, num2);
                const min = Math.min(num1, num2);
                correctAnswer = max - min;
                questionDisplay.textContent = `${max} - ${min}`;
            }
            answerInput.value = '';
        }

        function checkAnswer() {
            const userAnswer = parseInt(answerInput.value);
            
            if (!isNaN(userAnswer)) {
                if (userAnswer === correctAnswer) {
                    score += 10; // Tambah skor jika benar
                } else {
                    score = Math.max(0, score - 5); // Kurangi skor jika salah (minimal 0)
                }
                scoreDisplay.textContent = score;
                generateQuestion();
                answerInput.focus();
            }
        }

        function endGame() {
            clearInterval(timerInterval);
            gameScreen.classList.add('hidden');
            resultScreen.classList.remove('hidden');
            finalScoreDisplay.textContent = score;
        }

        function resetGame() {
            resultScreen.classList.add('hidden');
            startScreen.classList.remove('hidden');
        }
    </script>
</body>
</html>
